<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Detector Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --accent: #00d2ff;
        --accent-glow: rgba(0, 210, 255, 0.25);
        --bg-deep: #05070a;
        --glass: rgba(255, 255, 255, 0.03);
        --glass-border: rgba(255, 255, 255, 0.08);
        --text-secondary: #94a3b8;
        --transition-speed: 0.4s;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
        background: var(--bg-deep);
        background-image: 
            radial-gradient(circle at 10% 10%, rgba(0, 210, 255, 0.08) 0%, transparent 40%),
            radial-gradient(circle at 90% 90%, rgba(123, 97, 255, 0.08) 0%, transparent 40%);
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }

    .container {
        width: 100%;
        max-width: 600px;
        animation: appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes appear {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
    }

    .header h1 {
        font-size: clamp(28px, 8vw, 40px);
        font-weight: 800;
        letter-spacing: -1px;
        background: linear-gradient(135deg, #fff 30%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .card {
        background: var(--glass);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: clamp(20px, 5vw, 40px);
        box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
        position: relative;
        overflow: hidden; /* Important for the loading overlay */
    }

    /* LOADING OVERLAY */
    #loadingOverlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(5, 7, 10, 0.8);
        backdrop-filter: blur(12px);
        display: none; /* Hidden by default */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(0, 210, 255, 0.1);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .loading-text {
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--accent);
        text-transform: uppercase;
        font-size: 14px;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    /* Rest of the UI styling */
    .tabs {
        display: flex;
        background: rgba(0, 0, 0, 0.3);
        padding: 4px;
        border-radius: 16px;
        margin-bottom: 30px;
        border: 1px solid var(--glass-border);
    }

    .tab {
        flex: 1;
        padding: 12px;
        text-align: center;
        border-radius: 12px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        color: var(--text-secondary);
        transition: 0.3s ease;
    }

    .tab.active {
        background: var(--accent);
        color: #000;
    }

    .input-box {
        display: none;
        animation: slideUp 0.4s ease;
    }

    .input-box.active {
        display: block;
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    textarea {
        width: 100%;
        height: 160px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid var(--glass-border);
        border-radius: 18px;
        padding: 16px;
        color: #fff;
        font-size: 16px;
        resize: none;
        outline: none;
    }

    .file-box {
        border: 2px dashed var(--glass-border);
        padding: 40px;
        border-radius: 18px;
        text-align: center;
        cursor: pointer;
        display: block;
        transition: 0.3s;
    }

    .file-box:hover { border-color: var(--accent); }
    .file-box input { display: none; }

    .btn {
        margin-top: 24px;
        width: 100%;
        padding: 18px;
        border-radius: 16px;
        border: none;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:disabled { opacity: 0.2; cursor: not-allowed; }

    .result {
        margin-top: 20px;
        padding: 16px;
        border-radius: 16px;
        font-weight: 600;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .text { background: rgba(52, 211, 153, 0.1); color: #34d399; }
    .image { background: rgba(96, 165, 250, 0.1); color: #60a5fa; }
    .video { background: rgba(251, 191, 36, 0.1); color: #fbbf24; }
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>AI Detector</h1>
        <p>Advanced Content Analysis</p>
    </div>

    <div class="card">
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-text">Analyzing Content...</div>
        </div>

        <form method="POST" enctype="multipart/form-data" id="form">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('text')">Text</div>
                <div class="tab" onclick="switchTab('image')">Image</div>
                <div class="tab" onclick="switchTab('video')">Video</div>
            </div>

            <div class="input-area">
                <div id="textBox" class="input-box active">
                    <textarea name="text" id="textInput" placeholder="Paste your text..."></textarea>
                </div>

                <div id="imageBox" class="input-box">
                    <label class="file-box">
                        <span>Click to upload Image</span><br>
                        <span>Upto 10 MB</span>
                        <input type="file" name="image" id="imageInput" accept="image/*">
                    </label>
                    <div id="imageName" style="color:var(--accent); font-size:12px; margin-top:10px;"></div>
                </div>

                <div id="videoBox" class="input-box">
                    <label class="file-box">
                        <span>Click to upload Video</span><br>
                        <span>Upto 50 MB</span>
                        <input type="file" name="video" id="videoInput" accept="video/*">
                    </label>
                    <div id="videoName" style="color:var(--accent); font-size:12px; margin-top:10px;"></div>
                </div>
            </div>

            <button class="btn" id="submitBtn" disabled>Analyze Now</button>
        </form>
    </div>

    {% if text_result %}<div class="result text">{{ text_result }}</div>{% endif %}
    {% if image_result %}<div class="result image">{{ image_result }}</div>{% endif %}
    {% if video_result %}<div class="result video">{{ video_result }}</div>{% endif %}
</div>

<script>
let current = "text";
const form = document.getElementById("form");
const btn = document.getElementById("submitBtn");
const textInput = document.getElementById("textInput");
const imageInput = document.getElementById("imageInput");
const videoInput = document.getElementById("videoInput");
const loader = document.getElementById("loadingOverlay");

function switchTab(type) {
    current = type;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
    
    document.querySelectorAll(".input-box").forEach(box => box.classList.remove("active"));
    document.getElementById(type + "Box").classList.add("active");
    validate();
}

function validate() {
    if (current === "text") btn.disabled = !textInput.value.trim();
    if (current === "image") btn.disabled = imageInput.files.length === 0;
    if (current === "video") btn.disabled = videoInput.files.length === 0;
}

// TRIGGER THE LOADING SCREEN ON SUBMIT
form.onsubmit = function() {
    loader.style.display = "flex";
    btn.disabled = true;
    btn.innerText = "Processing...";
};

textInput.addEventListener("input", validate);
imageInput.addEventListener("change", () => {
    document.getElementById("imageName").innerText = imageInput.files[0]?.name || "";
    validate();
});
videoInput.addEventListener("change", () => {
    document.getElementById("videoName").innerText = videoInput.files[0]?.name || "";
    validate();
});
</script>

</body>
</html>
