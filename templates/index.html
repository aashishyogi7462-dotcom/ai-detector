<!DOCTYPE html>
<html>
<head>
    <title>AI Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 8px;
            margin-bottom: 15px;
        }

        .file-box {
            text-align: left;
            margin-bottom: 12px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        input[type="file"] {
            width: 100%;
            padding: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(to right, #36d1dc, #5b86e5);
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .result {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }

        .text { background: #d4edda; }
        .image { background: #cce5ff; }
        .video { background: #fff3cd; }

    </style>
</head>

<body>

<div class="container">
    <h2>🔥 TEST CHANGE 🔥</h2>
    <p style="color:gray;">Analyze Text, Image & Video</p>

    <form method="POST" enctype="multipart/form-data">

        <!-- TEXT -->
        <textarea name="text" placeholder="Enter your text here..."></textarea>

        <!-- IMAGE -->
        <div class="file-box">
            <label>🖼 Upload Image</label>
            <input type="file" name="image">
        </div>

        <!-- VIDEO -->
        <div class="file-box">
            <label>🎥 Upload Video</label>
            <input type="file" name="video">
        </div>

        <button type="submit">Analyze</button>
    </form>

    <!-- RESULTS -->
    {% if text_result %}
    <div class="result text">🧠 {{ text_result }}</div>
    {% endif %}

    {% if image_result %}
    <div class="result image">🖼 {{ image_result }}</div>
    {% endif %}

    {% if video_result %}
    <div class="result video">🎥 {{ video_result }}</div>
    {% endif %}

</div>

</body>
</html>
