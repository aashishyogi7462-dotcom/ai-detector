<!DOCTYPE html>
<html>
<head>
    <title>AI Deepfake Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚀 AI Deepfake Detector</h1>
    <p>Analyze Text, Image & Video</p>

    <form method="POST" enctype="multipart/form-data">

        <textarea name="text" placeholder="✍️ Enter text..."></textarea>

        <label>🖼 Upload Image</label>
        <input type="file" name="image">

        <label>🎥 Upload Video</label>
        <input type="file" name="video">

        <button type="submit">Analyze</button>

    </form>

    <div class="results">

        {% if text_result %}
        <div class="card text">
            <h3>📝 Text Result</h3>
            <p>{{ text_result }}</p>
        </div>
        {% endif %}

        {% if image_result %}
        <div class="card image">
            <h3>🖼 Image Result</h3>
            <p>{{ image_result }}</p>
        </div>
        {% endif %}

        {% if video_result %}
        <div class="card video">
            <h3>🎥 Video Result</h3>
            <p>{{ video_result }}</p>
        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
