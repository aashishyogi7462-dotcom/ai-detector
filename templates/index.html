<!DOCTYPE html>
<html>
<head>
    <title>AI Detector</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            text-align: center;
            padding: 40px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 80px;
        }

        button {
            background: blue;
            color: white;
            padding: 10px;
            width: 100%;
            border: none;
            margin-top: 10px;
        }

        .result {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
        }

        .text { background: #d4edda; }
        .image { background: #cce5ff; }
        .video { background: #f8d7da; }

    </style>
</head>

<body>

<div class="box">
    <h2>🚀 AI Detector</h2>

    <form method="POST" enctype="multipart/form-data">

        <textarea name="text" placeholder="Enter text"></textarea><br><br>

        <input type="file" name="image"><br><br>
        <input type="file" name="video"><br><br>

        <button type="submit">Analyze</button>
    </form>

    {% if text_result %}
    <div class="result text">{{ text_result }}</div>
    {% endif %}

    {% if image_result %}
    <div class="result image">{{ image_result }}</div>
    {% endif %}

    {% if video_result %}
    <div class="result video">{{ video_result }}</div>
    {% endif %}

</div>

</body>
</html>
