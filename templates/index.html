<!DOCTYPE html>
<html>
<head>
    <title>AI Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>🚀 AI Detector</h1>

    <form method="POST" enctype="multipart/form-data">

        <textarea name="text" placeholder="Enter text"></textarea>

        <input type="file" name="image">
        <input type="file" name="video">

        <button type="submit">Analyze</button>

    </form>

    {% if text_result %}
        <div class="result">📝 {{ text_result }}</div>
    {% endif %}

    {% if image_result %}
        <div class="result">🖼 {{ image_result }}</div>
    {% endif %}

    {% if video_result %}
        <div class="result">🎥 {{ video_result }}</div>
    {% endif %}

</div>

</body>
</html>
